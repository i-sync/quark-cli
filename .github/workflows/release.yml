name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.asset_name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset_name: quark-linux-x86_64
            archive: tar.gz
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            asset_name: quark-linux-aarch64
            archive: tar.gz
          - os: macos-13
            target: x86_64-apple-darwin
            asset_name: quark-macos-x86_64
            archive: tar.gz
          - os: macos-14
            target: aarch64-apple-darwin
            asset_name: quark-macos-aarch64
            archive: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset_name: quark-windows-x86_64
            archive: zip

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release -p quarkcli --target ${{ matrix.target }}

      - name: Prepare archive directory
        shell: bash
        run: |
          mkdir -p dist/${{ matrix.asset_name }}
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            cp target/${{ matrix.target }}/release/quark.exe dist/${{ matrix.asset_name }}/
          else
            cp target/${{ matrix.target }}/release/quark dist/${{ matrix.asset_name }}/
          fi
          cp README.md LICENSE NOTICE.md dist/${{ matrix.asset_name }}/

      - name: Create tar archive
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          cd dist
          tar -czf ../${{ matrix.asset_name }}.tar.gz ${{ matrix.asset_name }}

      - name: Create zip archive
        if: matrix.archive == 'zip'
        shell: pwsh
        run: Compress-Archive -Path dist/${{ matrix.asset_name }} -DestinationPath ${{ matrix.asset_name }}.zip

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: |
            ${{ matrix.asset_name }}.tar.gz
            ${{ matrix.asset_name }}.zip
          if-no-files-found: ignore

      - name: Publish GitHub release asset
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ matrix.asset_name }}.tar.gz
            ${{ matrix.asset_name }}.zip
